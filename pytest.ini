[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:cacheprovider
    --ignore=tests/test_ground-Truth.py
    --ignore=tests/test_icgn_integration.py
    --ignore=tests/test_icgn_core_numba.py
    --ignore=tests/test_interpolation_numba.py
    --ignore=tests/test_shape_function_numba.py
    --ignore=tests/test_strain_pls_numba.py
    --ignore=tests/test_adss_batch_parallel.py
    --ignore=tests/test_adss_evaluate_quarter_zncc.py
    --ignore=tests/test_adss_process_poi.py
    --ignore=tests/test_adss_quarter_coords.py
    --ignore=tests/test_crack_detection.py
    --ignore=tests/test_crack_multiscale_canny.py
